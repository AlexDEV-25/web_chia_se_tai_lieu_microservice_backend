server:
  port: 8888

app:
  api-prefix: /v1

spring:
  main:
    banner-mode: off

  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth_service
          uri: http://localhost:8080
          predicates:
            - Path=${app.api-prefix}/api/auth/**,${app.api-prefix}/api/users/**,${app.api-prefix}/api/users/admin/**
          filters:
            - StripPrefix=1
        - id: profile_service
          uri: http://localhost:8081
          predicates:
            - Path=${app.api-prefix}/api/external/users-detail/**,${app.api-prefix}/api/follows/**
          filters:
            - StripPrefix=1
        - id: study_service
          uri: http://localhost:8082
          predicates:
            - Path=${app.api-prefix}/api/documents/admin/**,${app.api-prefix}/api/documents/**,${app.api-prefix}/api/favorites/**
          filters:
            - StripPrefix=1

logging:
  level:
    root: warn