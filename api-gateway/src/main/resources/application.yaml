server:
  port: 8888

app:
  api-prefix: /v1

  domain:
    frontend: ${FRONTEND_DOMAIN}

spring:
  main:
    banner-mode: off

  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth_service
          uri: http://localhost:8080
          predicates:
            - Path=${app.api-prefix}/api/auth/**,${app.api-prefix}/api/users/**,${app.api-prefix}/api/users/admin/**
          filters:
            - StripPrefix=1
        - id: profile_service
          uri: http://localhost:8081
          predicates:
            - Path=${app.api-prefix}/api/external/users-detail/**,${app.api-prefix}/api/external/follows/**
          filters:
            - StripPrefix=1
        - id: study_service
          uri: http://localhost:8082
          predicates:
            - Path=${app.api-prefix}/api/categories/admin/**,${app.api-prefix}/api/categories/**,${app.api-prefix}/api/documents/admin/**,${app.api-prefix}/api/documents/**,${app.api-prefix}/api/favorites/**
          filters:
            - StripPrefix=1
        - id: interaction_service
          uri: http://localhost:8084
          predicates:
            - Path=${app.api-prefix}/api/comments/admin/**,${app.api-prefix}/api/ratings/admin/**,${app.api-prefix}/api/reports/admin/**,${app.api-prefix}/api/comments/**,${app.api-prefix}/api/ratings/**,${app.api-prefix}/api/reports/**
          filters:
            - StripPrefix=1

logging:
  level:
    root: warn