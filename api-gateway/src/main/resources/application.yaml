server:
  port: 8888

app:
  api-prefix: /v1

spring:
  main:
    banner-mode: off

  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth_service
          uri: http://localhost:8080
          predicates:
            - Path=${app.api-prefix}/api/auth/**,${app.api-prefix}/api/users/**
          filters:
            - StripPrefix=1
        - id: profile_service
          uri: http://localhost:8081
          predicates:
            - Path=${app.api-prefix}/api/external/users-detail/**
          filters:
            - StripPrefix=1
